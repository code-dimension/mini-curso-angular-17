<div class="actions">
  <button mat-raised-button color="accent" [routerLink]="['/form']">Criar Produto</button>
</div>

@for (product of products(); track product.id) { 
  @defer (on immediate) {
    <app-card
      [product]="product"
      (change)="onChange($event)"
      (delete)="onDelete($event)"
    />
  } 
} 
@empty { 
  @defer (on immediate) {
    <app-no-tems />
  }
}
